
<html>
<head>
    <title>TechFest 2023 - Registration</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h2>TechFest 2023 - Registration Form</h2>

<form action="display.php" method="POST">

    <label>Name:</label>
    <input type="text" name="name" required placeholder="name123445">

    <label>Email:</label>
    <input type="email" name="email" required>

    <label>College Name:</label>
    <input type="text" name="college" required>

    <label>Branch:</label>
    <select >
        <option >CSE</option>
        <option >ECE</option>
        <option >ME</option>
        <option>CE</option>
        <option>Other</option>
    </select>

    <label>Phone Number:</label>
    <input type="text" name="phone" required>

    <button type="submit">Submit</button>
</form>

</body>
</html>
